apiVersion: trainer.kubeflow.org/v1alpha1
kind: ClusterTrainingRuntime
metadata:
  name: demo-cluster-runtime
  labels:
    trainer.kubeflow.org/framework: mpi
    app.kubernetes.io/name: demo-cluster-runtime
spec:
  mlPolicy:
    numNodes: 1
    mpi:
      mpiImplementation: OpenMPI
      numProcPerNode: 2
      runLauncherAsNode: false
      sshAuthMountPath: /root/.ssh
  podGroupPolicy:
    coscheduling:
      scheduleTimeoutSeconds: 90
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
    spec:
      replicatedJobs:
        - name: launcher
          replicas: 1
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
                app.kubernetes.io/component: mpi-launcher
            spec:
              backoffLimit: 0
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: launcher
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - echo launcher template; sleep 3600
