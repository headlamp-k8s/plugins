apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: demo-team-runtime
  namespace: kubeflow-user
  labels:
    trainer.kubeflow.org/framework: torch
    app.kubernetes.io/name: demo-team-runtime
spec:
  mlPolicy:
    numNodes: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
    spec:
      replicatedJobs:
        - name: node
          replicas: 2
          template:
            metadata:
              labels:
                trainer.kubeflow.org/trainjob-ancestor-step: trainer
                app.kubernetes.io/component: trainer-node
            spec:
              backoffLimit: 0
              template:
                metadata:
                  labels:
                    app.kubernetes.io/component: trainer-node
                spec:
                  restartPolicy: Never
                  containers:
                    - name: node
                      image: busybox:1.36
                      command:
                        - sh
                        - -c
                        - echo runtime node template; sleep 3600
