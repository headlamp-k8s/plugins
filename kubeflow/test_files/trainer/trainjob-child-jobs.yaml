apiVersion: batch/v1
kind: Job
metadata:
  name: demo-trainjob-node-0
  namespace: kubeflow-user
  labels:
    app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
    jobset.sigs.k8s.io/jobset-name: demo-trainjob
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
        jobset.sigs.k8s.io/jobset-name: demo-trainjob
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "epoch=1 loss=0.91"
              echo "epoch=2 loss=0.72"
              echo "epoch=3 loss=0.53"
              sleep 3600
---
apiVersion: batch/v1
kind: Job
metadata:
  name: demo-trainjob-node-1
  namespace: kubeflow-user
  labels:
    app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
    jobset.sigs.k8s.io/jobset-name: demo-trainjob
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: headlamp-kubeflow-trainer-demo
        jobset.sigs.k8s.io/jobset-name: demo-trainjob
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "validation accuracy=0.94"
              echo "training complete"
