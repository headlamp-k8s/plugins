# KRaft Kafka with KafkaNodePool (Strimzi 1.0.0+).
# Cluster name: strimzi-demo-kraft — use topics/users labeled for this name.
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: strimzi-demo-kraft
  namespace: strimzi-headlamp-test
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.0.0
    metadataVersion: 4.0-IV3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: brokers
  namespace: strimzi-headlamp-test
  labels:
    strimzi.io/cluster: strimzi-demo-kraft
spec:
  replicas: 1
  roles:
    - broker
    - controller
  storage:
    type: ephemeral
