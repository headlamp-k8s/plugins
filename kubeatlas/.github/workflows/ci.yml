name: CI

# Lint, type-check, test, and build the plugin on every push to main
# and every pull request. No untrusted GitHub event inputs are used
# in any run: step — only static commands.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: lint + tsc + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run tsc

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
