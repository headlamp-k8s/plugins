apiVersion: v1
kind: Service
metadata:
  name: redis-rest-proxy
  labels:
    app: redis-rest-proxy
  namespace: falco
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: redis-rest-proxy

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-rest-proxy
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app: redis-rest-proxy
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress on the proxy port from any source. Restricting `from` to
    # pods in the falco namespace breaks the in-cluster Service proxy path
    # (`/api/v1/namespaces/.../services/.../proxy`), where the connection
    # originates from the kube-apiserver / control plane rather than from a
    # falco-namespace pod.
    - ports:
        - protocol: TCP
          port: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-rest-proxy
  namespace: falco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-rest-proxy
  template:
    metadata:
      labels:
        app: redis-rest-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-rest-proxy
          image: python:3.13.3-alpine3.21
          workingDir: /tmp
          env:
            # The container runs as a non-root user (uid 1000) and cannot write
            # to the global site-packages on the upstream `python:*` images.
            # Set HOME to a writable location so `pip install --user` can
            # install into ${HOME}/.local, where Python's user-site is
            # automatically picked up at import time.
            - name: HOME
              value: /tmp
            - name: PYTHONUSERBASE
              value: /tmp/.local
            - name: PATH
              value: /tmp/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          command: ['sh', '-c']
          args:
            - |
              pip install --user --no-cache-dir flask==3.1.3 redis==7.4.0 flask-cors==6.0.2 && \
              python3 - << 'EOF'
              from flask import Flask, request, jsonify
              from flask_cors import CORS
              import redis, json, sys, os
              app = Flask(__name__)
              CORS(app)
              rclient = redis.Redis(host='redis-service', port=6379)

              # Cap the falco:events list length so it cannot grow without
              # bound and exhaust Redis memory. Override via FALCO_EVENTS_MAX.
              EVENTS_MAX = int(os.environ.get('FALCO_EVENTS_MAX', '10000'))

              def _store_event(payload):
                  pipe = rclient.pipeline()
                  pipe.lpush('falco:events', payload)
                  pipe.ltrim('falco:events', 0, EVENTS_MAX - 1)
                  pipe.execute()

              @app.route('/events', methods=['POST'])
              def post_events():
                  try:
                      # Try to parse JSON
                      data = request.get_json(silent=True)

                      # If can't parse as JSON, try getting raw data
                      if data is None:
                          data = request.get_data(as_text=True)
                          # Log what we received
                          print(f"Received raw data: {data}", file=sys.stderr)
                          try:
                              # Try to parse it as JSON
                              data = json.loads(data)
                          except:
                              # If not valid JSON, store as is
                              _store_event(json.dumps({"rule":"Raw Event", "output":data}))
                              return jsonify(status='ok'), 201

                      # Store proper JSON data
                      print(f"Storing JSON: {json.dumps(data)}", file=sys.stderr)
                      _store_event(json.dumps(data))
                      return jsonify(status='ok'), 201
                  except Exception as e:
                      print(f"Error in post_events: {str(e)}", file=sys.stderr)
                      return jsonify(error=str(e)), 500

              @app.route('/events', methods=['GET'])
              def get_events():
                  try:
                      limit = int(request.args.get('limit', 100))
                  except ValueError:
                      limit = 100
                  limit = max(1, min(limit, 1000))
                  events = [json.loads(e) for e in rclient.lrange('falco:events', 0, limit-1)]
                  return jsonify(events)

              @app.route('/ping', methods=['GET'])
              def ping():
                  return 'pong'

              if __name__ == "__main__":
                  app.run(host='0.0.0.0', port=8080)
              EOF
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
